<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Face Test</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
</head>

<body style="background:black; color:white; text-align:center;">

<h2>TEST DETECTION VISAGE</h2>

<video id="video" width="640" height="480" autoplay muted></video>
<p id="status">Chargement...</p>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");

async function start() {

    const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";

    status.innerText = "Chargement modèles...";

    await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);

    status.innerText = "Modèles OK. Démarrage caméra...";

    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    video.addEventListener("play", () => {

        setInterval(async () => {

            const detections = await faceapi.detectAllFaces(
                video,
                new faceapi.SsdMobilenetv1Options()
            );

            if(detections.length > 0){
                status.innerText = "VISAGE DETECTÉ";
                status.style.color = "lime";
            } else {
                status.innerText = "Aucun visage";
                status.style.color = "red";
            }

        }, 500);

    });

}

start();

</script>

</body>
</html>
